name: kagoj

services:
  postgres:
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_USER: kagoj
      POSTGRES_PASSWORD: kagoj
      POSTGRES_DB: kagoj
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kagoj -d kagoj"]
      interval: 5s
      timeout: 5s
      retries: 10
    image: postgres:16-alpine
    restart: unless-stopped
    volumes:
      - postgres-dev-data:/var/lib/postgresql/data

volumes:
  postgres-dev-data:
